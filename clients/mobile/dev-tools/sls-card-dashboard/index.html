<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>SLS 卡片对照 · Dashboard</title>
<style>
:root {
  --bg:#0F1117; --surface:#171A23; --surface2:#1F2330; --line:#252A3A;
  --ink:#E5E9F0; --ink-soft:#9CA3AF; --ink-faint:#6B7280;
  --high:#EF4444; --mid:#F59E0B; --low:#EAB308; --skip:#6B7280; --done:#10B981;
  --accent:#6366F1; --pink:#FB7299; --blue:#00AEEC;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 -apple-system,BlinkMacSystemFont,sans-serif; }
header { padding:18px 28px; border-bottom:1px solid var(--line); background:var(--surface); display:flex; align-items:center; gap:24px; }
header h1 { margin:0; font-size:18px; font-weight:700; }
header .meta { color:var(--ink-soft); font-size:12px; }
header .meta b { color:var(--ink); }
header .refresh { margin-left:auto; padding:6px 14px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; }
header .refresh:hover { opacity:.85; }
main { padding:24px 28px; max-width:1600px; }
.unit { background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:20px; margin-bottom:24px; }
.unit-head { display:flex; align-items:baseline; gap:16px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--line); }
.unit-head h2 { margin:0; font-size:16px; font-weight:700; }
.unit-head .time-range { color:var(--ink-soft); font-size:12px; font-family:'SF Mono',Monaco,monospace; }
.status-pill { margin-left:auto; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:700; }
.status-pending { background:rgba(245,158,11,.15); color:#FBBF24; }
.status-fixed { background:rgba(16,185,129,.15); color:var(--done); }
.compare-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:20px; }
.compare-col { background:var(--surface2); border:1px solid var(--line); border-radius:8px; padding:12px; min-height:200px; }
.compare-col h3 { margin:0 0 10px; font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
.shot { margin-bottom:10px; }
.shot img { width:100%; height:auto; border-radius:6px; border:1px solid var(--line); cursor:zoom-in; transition:transform .15s; }
.shot img:hover { transform:scale(1.02); }
.shot .cap { font-size:11px; color:var(--ink-faint); margin-top:4px; font-family:'SF Mono',Monaco,monospace; }
.issues h3 { font-size:13px; font-weight:700; margin:0 0 10px; color:var(--ink); }
.issue { display:grid; grid-template-columns:48px 60px 1fr; gap:12px; padding:10px 12px; border-radius:6px; margin-bottom:6px; background:var(--surface2); border-left:3px solid; }
.issue.high { border-color:var(--high); }
.issue.mid { border-color:var(--mid); }
.issue.low { border-color:var(--low); }
.issue.skip { border-color:var(--skip); opacity:.55; }
.issue.fixed { border-color:var(--done); opacity:.55; }
.issue-code { font-weight:700; font-family:'SF Mono',Monaco,monospace; color:var(--ink); }
.issue-level { font-size:10px; font-weight:700; text-transform:uppercase; }
.issue-level.high { color:var(--high); }
.issue-level.mid { color:var(--mid); }
.issue-level.low { color:var(--low); }
.issue-level.skip { color:var(--skip); }
.issue-level.fixed { color:var(--done); }
.issue-body .text { color:var(--ink); margin-bottom:4px; }
.issue-body .meta { font-size:11px; color:var(--ink-soft); font-family:'SF Mono',Monaco,monospace; line-height:1.4; }
.issue-body .meta b { color:var(--ink); font-weight:600; }
/* lightbox */
#lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:99; align-items:center; justify-content:center; cursor:zoom-out; padding:20px; }
#lightbox.on { display:flex; }
#lightbox img { max-width:100%; max-height:100%; border-radius:8px; }
.empty { text-align:center; color:var(--ink-faint); padding:60px 20px; font-size:13px; }
</style>
</head>
<body>
<header>
  <h1>SLS 卡片对照 Dashboard</h1>
  <div class="meta">视频 <b id="video-file">-</b> · 起 <b id="video-start">-</b> · 时长 <b id="video-dur">-</b>s</div>
  <button class="refresh" onclick="load()">⟳ 刷新</button>
</header>
<main id="root">
  <div class="empty">加载中…</div>
</main>
<div id="lightbox" onclick="this.classList.remove('on')"><img id="lightbox-img"></div>

<script>
const STATUS_LABEL = { pending:'未修', fixed:'已修' };
const LEVEL_LABEL = { high:'高', mid:'中', low:'低', skip:'跳过', fixed:'已修' };

async function load() {
  const m = await fetch('manifest.json?' + Date.now()).then(r => r.json());
  document.getElementById('video-file').textContent = m.video_meta.file;
  document.getElementById('video-start').textContent = m.video_meta.start_real_ts;
  document.getElementById('video-dur').textContent = m.video_meta.duration_s;

  const root = document.getElementById('root');
  if (!m.compare_units || m.compare_units.length === 0) {
    root.innerHTML = '<div class="empty">暂无对照单元。在 manifest.json 里加 compare_units[]。</div>';
    return;
  }
  root.innerHTML = m.compare_units.map(renderUnit).join('');
  document.querySelectorAll('.shot img').forEach(img => {
    img.onclick = () => {
      document.getElementById('lightbox-img').src = img.src;
      document.getElementById('lightbox').classList.add('on');
    };
  });
}

function renderUnit(u) {
  const status = u.status || 'pending';
  const realShots = (u.real_frames || []).map(s =>
    `<div class="shot"><img src="${s.src}?t=${Date.now()}"><div class="cap">${s.caption||''}</div></div>`
  ).join('') || '<div class="cap">（无真实帧）</div>';
  const slsShots = (u.sls_shots || []).map(s =>
    `<div class="shot"><img src="${s.src}?t=${Date.now()}"><div class="cap">${s.caption||''}</div></div>`
  ).join('') || '<div class="cap">（无 SLS 截屏）</div>';
  const issues = (u.issues || []).map(i => `
    <div class="issue ${i.level}">
      <div class="issue-code">${i.code}</div>
      <div class="issue-level ${i.level}">${LEVEL_LABEL[i.level]||i.level}</div>
      <div class="issue-body">
        <div class="text">${escapeHtml(i.text)}</div>
        ${i.root_cause ? `<div class="meta"><b>根因</b>：${escapeHtml(i.root_cause)}</div>` : ''}
        ${i.fix ? `<div class="meta"><b>修法</b>：${escapeHtml(i.fix)}</div>` : ''}
      </div>
    </div>
  `).join('') || '<div class="cap">（无缺陷）</div>';
  return `
    <section class="unit">
      <div class="unit-head">
        <h2>${escapeHtml(u.title)}</h2>
        <div class="time-range">${escapeHtml(u.real_time_range||'')}</div>
        <div class="status-pill status-${status}">${STATUS_LABEL[status]||status}</div>
      </div>
      <div class="compare-row">
        <div class="compare-col">
          <h3>真实 B 站界面（录屏帧）</h3>
          ${realShots}
        </div>
        <div class="compare-col">
          <h3>SLS 还原卡片</h3>
          ${slsShots}
        </div>
        <div class="compare-col issues">
          <h3>缺陷清单 / 修复进度</h3>
          ${issues}
        </div>
      </div>
    </section>
  `;
}

function escapeHtml(s) {
  return String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
}

load();
setInterval(load, 5000);  // 5s 自动刷新
</script>
</body>
</html>
