<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>专注锁 — 已屏蔽</title>
  <style>
    :root{
      --blue:#00E5FF; --cyan:#7DF9FF; --green:#00FF88; --orange:#FF9933;
      --bg:#04060a; --ink:rgba(0,229,255,.55);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      background:radial-gradient(1200px 800px at 50% 38%, #0a1322 0%, #060a12 45%, var(--bg) 100%);
      color:var(--blue);
      font-family:'Segoe UI','Microsoft YaHei',sans-serif;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;position:relative;
    }
    /* 背景：网格 + 扫描线 + 暗角 */
    .grid,.scan,.vignette{position:fixed;inset:0;pointer-events:none}
    .grid{
      background-image:
        linear-gradient(rgba(0,229,255,.05) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,229,255,.05) 1px,transparent 1px);
      background-size:42px 42px;
      mask-image:radial-gradient(900px 600px at 50% 42%,#000 0%,transparent 78%);
      -webkit-mask-image:radial-gradient(900px 600px at 50% 42%,#000 0%,transparent 78%);
    }
    .scan{
      background:repeating-linear-gradient(0deg,
        rgba(0,229,255,.035) 0,rgba(0,229,255,.035) 1px,transparent 1px,transparent 4px);
      animation:scan 8s linear infinite;
    }
    @keyframes scan{from{background-position-y:0}to{background-position-y:120px}}
    .vignette{box-shadow:inset 0 0 320px rgba(0,0,0,.85)}

    /* 中央面板 */
    .panel{
      position:relative;z-index:2;width:min(560px,86vw);
      padding:54px 60px 46px;text-align:center;
      background:linear-gradient(180deg,rgba(4,12,28,.92),rgba(2,7,18,.92));
      border:1px solid rgba(0,229,255,.4);
      clip-path:polygon(20px 0,calc(100% - 20px) 0,100% 20px,100% calc(100% - 20px),
        calc(100% - 20px) 100%,20px 100%,0 calc(100% - 20px),0 20px);
      box-shadow:0 0 60px rgba(0,229,255,.08),inset 0 0 40px rgba(0,229,255,.04);
      animation:rise .5s cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}

    /* 四角 L 型角标 */
    .corner{position:absolute;width:18px;height:18px;border:2px solid var(--blue);opacity:.85}
    .corner.tl{top:8px;left:8px;border-right:0;border-bottom:0}
    .corner.tr{top:8px;right:8px;border-left:0;border-bottom:0}
    .corner.bl{bottom:8px;left:8px;border-right:0;border-top:0}
    .corner.br{bottom:8px;right:8px;border-left:0;border-top:0}

    .tag{
      display:inline-flex;align-items:center;gap:7px;
      font-family:'Consolas','Courier New',monospace;font-size:11px;letter-spacing:.32em;
      color:var(--orange);border:1px solid rgba(255,153,51,.35);
      padding:4px 12px;border-radius:2px;margin-bottom:26px;text-transform:uppercase;
      animation:blink 2.4s steps(1) infinite;
    }
    @keyframes blink{0%,92%,100%{opacity:1}94%{opacity:.35}}
    .tag .dot{width:6px;height:6px;border-radius:50%;background:var(--orange);box-shadow:0 0 8px var(--orange)}

    /* 盾形图标 */
    .shield{width:74px;height:74px;margin:0 auto 22px;display:block;
      filter:drop-shadow(0 0 16px rgba(0,229,255,.55));animation:pulse 2.6s ease-in-out infinite}
    @keyframes pulse{0%,100%{filter:drop-shadow(0 0 12px rgba(0,229,255,.4))}
      50%{filter:drop-shadow(0 0 22px rgba(0,229,255,.75))}}

    h1{
      font-family:'Segoe UI',sans-serif;font-size:30px;font-weight:800;
      letter-spacing:.16em;color:#eafcff;
      text-shadow:0 0 22px rgba(0,229,255,.6),0 0 2px rgba(0,229,255,.9);
      margin-bottom:4px;
    }
    h1 .glitch{position:relative;display:inline-block}
    h1 .glitch::before,h1 .glitch::after{
      content:attr(data-t);position:absolute;left:0;top:0;width:100%;overflow:hidden;opacity:.6}
    h1 .glitch::before{color:#ff3b6b;animation:gl1 3.6s steps(2) infinite}
    h1 .glitch::after{color:var(--cyan);animation:gl2 3.6s steps(2) infinite}
    @keyframes gl1{0%,96%,100%{transform:none;clip-path:inset(0 0 100% 0)}97%{transform:translate(-2px,1px);clip-path:inset(0 0 40% 0)}}
    @keyframes gl2{0%,96%,100%{transform:none;clip-path:inset(100% 0 0 0)}98%{transform:translate(2px,-1px);clip-path:inset(55% 0 0 0)}}

    .rule{width:0;height:1px;margin:16px auto 18px;
      background:linear-gradient(90deg,transparent,var(--blue),transparent);
      box-shadow:0 0 8px var(--blue);animation:grow .6s .25s forwards}
    @keyframes grow{to{width:180px}}

    .sub{color:var(--ink);font-size:14px;line-height:1.95}
    .sub strong{color:var(--cyan);font-weight:600}
    .focus-line{color:rgba(0,255,136,.6);font-size:12.5px;letter-spacing:.18em;margin-top:6px}

    .target{
      margin:22px auto 0;display:inline-flex;align-items:center;gap:10px;
      font-family:'Consolas','Courier New',monospace;font-size:12.5px;letter-spacing:.05em;
      color:rgba(125,249,255,.85);background:rgba(0,229,255,.05);
      border:1px solid rgba(0,229,255,.18);padding:7px 14px;border-radius:3px;max-width:100%}
    .target .lbl{color:rgba(0,229,255,.4);font-size:10.5px;letter-spacing:.2em}
    .target .h{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .warn{margin-top:26px;padding:13px 16px;
      border:1px solid rgba(255,153,51,.28);border-left:3px solid var(--orange);
      background:rgba(255,153,51,.06);color:rgba(255,193,128,.9);
      font-size:11.5px;line-height:1.75;text-align:left;border-radius:2px}
    .warn b{color:var(--orange)}
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="scan"></div>
  <div class="vignette"></div>

  <div class="panel">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>

    <div class="tag"><span class="dot"></span>System Lock · Active</div>

    <svg class="shield" viewBox="0 0 48 48" fill="none">
      <path d="M24 3 L42 10 V23 C42 35 34 42 24 45 C14 42 6 35 6 23 V10 Z"
            stroke="#00E5FF" stroke-width="1.6" fill="rgba(0,229,255,.05)"/>
      <path d="M24 8 L37 13 V23 C37 32 31 37.5 24 40 C17 37.5 11 32 11 23 V13 Z"
            stroke="rgba(0,229,255,.35)" stroke-width="1"/>
      <rect x="18" y="22" width="12" height="10" rx="1.5" stroke="#7DF9FF" stroke-width="1.6" fill="rgba(0,229,255,.08)"/>
      <path d="M20.5 22 V19 a3.5 3.5 0 0 1 7 0 V22" stroke="#7DF9FF" stroke-width="1.6"/>
      <circle cx="24" cy="26.5" r="1.6" fill="#7DF9FF"/>
    </svg>

    <h1><span class="glitch" data-t="FOCUS LOCK">FOCUS LOCK</span></h1>
    <div class="rule"></div>

    <p class="sub">此网站已被 <strong>Solevup 专注锁</strong> 屏蔽</p>
    <p class="focus-line">专注当下 · 完成任务</p>

    <div class="target">
      <span class="lbl">TARGET</span>
      <span class="h" id="h"></span>
    </div>

    <div class="warn">
      移除或禁用本扩展 <b>不会</b> 解除屏蔽。桌面端会立即检测到，并持续将浏览器最小化、让它无法使用，直到专注结束或扩展被重新启用。
    </div>
  </div>

  <script>
    const host = new URLSearchParams(location.search).get('host')
    document.getElementById('h').textContent = host || '—'
  </script>
</body>
</html>
